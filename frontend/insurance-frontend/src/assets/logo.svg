<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title>InsureSecure logo</title>
  <defs>
    <linearGradient id="grad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#04263a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Circular gradient background with soft shadow -->
  <g filter="url(#soft)">
    <circle cx="100" cy="100" r="90" fill="url(#grad)" />
  </g>

  <!-- Shield emblem in white, centered -->
  <path d="M100 48c-18 0-32 10-36 24-3 10 0 26 0 34 0 23 30 46 36 46s36-23 36-46c0-8 3-24 0-34-4-14-18-24-36-24z"
        fill="#ffffff" fill-opacity="0.95"/>

  <!-- Check mark accent -->
  <path d="M80 105l12 12 28-36" fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.98"/>

  <!-- Initials text -->
  <text x="100" y="135" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle" fill="#012026">IC</text>
</svg>
